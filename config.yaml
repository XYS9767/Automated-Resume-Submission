# ============================================================
# BOSS直聘自动投递 — 配置文件
# ============================================================

# --- 浏览器设置 ---
browser:
  headless: false              # 是否无头模式（首次登录必须 false）
  data_dir: "./browser_data"   # 浏览器用户数据目录（保存登录状态）
  window_size: [1280, 800]
  slow_mo: 500                 # 操作间延迟 ms（模拟人类速度）

# --- 登录方式 ---
# method: "qr"     → 扫码登录（推荐首次）
# method: "cookie" → 从 cookies.json 加载已保存的 Cookie
login:
  method: "qr"
  cookie_file: "./cookies.json"
  wait_seconds: 60             # 扫码等待秒数

# --- 简历文件 ---
resume:
  # 简历文件夹：自动扫描该目录下所有 .pdf/.docx/.txt 文件（推荐方式）
  resume_dir: "./resumes"
  # 手动指定（resume_dir 为空时生效）
  file_paths: []
  file_path: ""
  encoding: "utf-8"

# --- 岗位搜索条件 ---
search:
  keywords: ["运维开发工程师", "云原生运维", "运维工程师", "云原生运维工程师", "运维开发", "云原生运维", "容器化运维"]
  city: "北京"
  experience: "3-5年"               # 工作经验筛选: 应届生/1年以内/1-3年/3-5年/5-10年/10年以上
  salary: "10-20k"                   # 空=不限；可选: 3K以下/3-5K/5-10K/10-20K/20-50K/50K以上
  page_limit: 5                # 最多搜索页数
  jobs_per_page: 15            # 每页抓取数量

# --- 岗位过滤 ---
filter:
  # 标题排除关键词（含以下关键词的岗位跳过）
  exclude_titles:
    - "实习"
    - "兼职"
    - "外包"
    - "外派"
    - "劳务"
    - "培训"
    - "急聘"
    - "大量招"
    - "小白"
    - "普工"
    - "留学生"
    - "驻场"
    - "实施"
  # 公司排除关键词
  exclude_companies:
    - "人力资源"
    - "劳务派遣"
    - "外包服务"
    - "培训学校"
    - "保险"
    - "理财"
    - "投资管理"
    - "融资"
    - "留学生"
  # 最低匹配分 (0-100)，低于此分不投递
  min_match_score: 80
  # KPI 检测: 岗位被判为刷KPI时是否跳过 (建议开启)
  skip_kpi: true
  skip_kpi_score: 70   # KPI 得分 >= 此值跳过
  # AI 岗位适合度检查：用 DeepSeek 判断岗位是否确实匹配简历（仅 api 模式可用）
  ai_fit_check: true
  ai_fit_min_score: 40   # 适合度得分 < 此值跳过
  # 最高学历限制：要求高于此学历的岗位跳过（留空=不限制）
  max_education: "本科"
  # 最高经验限制：要求高于此经验的岗位跳过（留空=不限制）
  # 可选: 应届生/在校生/1年以内/1-3年/3-5年/...
  max_experience: "3-5年"

# --- 公司风险检测 ---
# mode: "rule"   → 基于规则的本地检测（免费，但数据有限）
# mode: "api"    → 调用外部 API（天眼查/企查查，需配置 key）
risk_check:
  mode: "api"
  api:
    provider: "deepseek"
    token: "sk-7a823e19b65148fbad340152e269f3e9"
  # 规则模式关键词
  risk_keywords:
    - "裁员"
    - "欠薪"
    - "纠纷"
    - "失信"
    - "倒闭"
    - "跑路"
    - "骗子"
    - "皮包"

# --- 投递行为 ---
submit:
  # 打招呼语（BOSS限制每天打招呼数量，建议简短）
  greeting: "您深耕Linux/容器化/分布式技术栈：精通Docker/K8s全生命周期管理、Jenkins CI/CD流水线设计与自动化运维，熟练搭建Prometheus监控与ELK日志体系，擅长Web集群、MySQL/Redis/TiDB数据库及Ceph存储运维，具备Shell脚本开发、系统安全加固及混合云管理能力，适配容器化、云原生、分布式系统等相关技术岗位"
  # 每天最大投递数（防止封号）
  daily_limit: 150
  # 投递间隔（秒），随机在 [min, max] 之间
  interval:
    min: 8
    max: 20

# --- 输出记录 ---
output:
  log_file: "./submit_log.csv"         # 投递日志 CSV
  record_file: "./apply_record.json"   # 详细投递记录 JSON
  log_level: "INFO"                    # DEBUG / INFO / WARNING / ERROR
